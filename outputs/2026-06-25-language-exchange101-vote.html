<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>언어교환101 투표</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18202a;
      --muted: #647184;
      --line: #d8e0ea;
      --paper: #ffffff;
      --bg: #f5f8fb;
      --accent: #0f8f7d;
      --accent-dark: #0a6d60;
      --warm: #ffb84d;
      --danger: #bf3d3d;
      --shadow: 0 18px 55px rgba(37, 55, 78, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(15, 143, 125, 0.12), transparent 35%),
        linear-gradient(315deg, rgba(255, 184, 77, 0.16), transparent 32%),
        var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      width: 44px;
      height: 44px;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: var(--accent);
      font-weight: 800;
      letter-spacing: 0;
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 34px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status-pill {
      border: 1px solid rgba(15, 143, 125, 0.28);
      color: var(--accent-dark);
      background: rgba(15, 143, 125, 0.1);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(290px, 0.65fr);
      gap: 20px;
      align-items: start;
    }

    .panel,
    .side-panel {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(216, 224, 234, 0.9);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: clamp(20px, 4vw, 34px);
    }

    .intro {
      display: grid;
      gap: 10px;
      margin-bottom: 24px;
    }

    .intro h2 {
      margin: 0;
      font-size: clamp(24px, 5vw, 42px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .intro p {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 15px;
    }

    .identity {
      display: grid;
      gap: 9px;
      margin-bottom: 22px;
    }

    label {
      color: #334154;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 13px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 143, 125, 0.12);
    }

    .choices {
      display: grid;
      gap: 12px;
      margin: 0 0 20px;
      padding: 0;
      list-style: none;
    }

    .choice {
      position: relative;
    }

    .choice button {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 13px;
      align-items: center;
      width: 100%;
      min-height: 76px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 15px;
      color: var(--ink);
      background: #fff;
      cursor: pointer;
      text-align: left;
      transition: border-color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .choice button:hover,
    .choice button:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 9px 22px rgba(15, 143, 125, 0.12);
      transform: translateY(-1px);
      outline: none;
    }

    .choice button[disabled] {
      cursor: default;
      transform: none;
      box-shadow: none;
      opacity: 0.78;
    }

    .choice button.selected {
      border-color: var(--accent);
      background: rgba(15, 143, 125, 0.08);
    }

    .choice-icon {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: #2f6fbc;
      font-size: 20px;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .choice:nth-child(2) .choice-icon {
      background: var(--accent);
    }

    .choice:nth-child(3) .choice-icon {
      background: #d78228;
    }

    .choice:nth-child(4) .choice-icon {
      background: #7a5cc8;
    }

    .choice-title {
      display: block;
      font-size: 17px;
      font-weight: 800;
      line-height: 1.25;
    }

    .choice-desc {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .vote-count {
      color: var(--accent-dark);
      font-weight: 800;
      white-space: nowrap;
    }

    .message {
      min-height: 24px;
      color: var(--accent-dark);
      font-size: 14px;
      font-weight: 700;
    }

    .side-panel {
      overflow: hidden;
    }

    .side-section {
      padding: 20px;
      border-bottom: 1px solid var(--line);
    }

    .side-section:last-child {
      border-bottom: 0;
    }

    .side-section h3 {
      margin: 0 0 12px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .result-list {
      display: grid;
      gap: 13px;
    }

    .result-row {
      display: grid;
      gap: 7px;
    }

    .result-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .result-meta strong {
      color: var(--ink);
    }

    .bar {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #e8edf3;
    }

    .bar span {
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width 300ms ease;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 5px;
      font-size: 22px;
    }

    .admin-actions {
      display: grid;
      gap: 10px;
    }

    .admin-actions button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      color: var(--ink);
      font-weight: 800;
    }

    .admin-actions button:hover,
    .admin-actions button:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    .admin-actions .danger {
      color: var(--danger);
    }

    .note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 820px) {
      .app {
        width: min(100% - 24px, 680px);
        padding-top: 18px;
      }

      .topbar,
      .layout {
        display: grid;
      }

      .status-pill {
        justify-self: start;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .choice button {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .vote-count {
        grid-column: 2;
      }

      .summary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand" aria-label="언어교환101">
        <div class="brand-mark">101</div>
        <div>
          <h1>언어교환101 투표</h1>
          <p>모임에서 바로 쓸 수 있는 전용 투표 페이지</p>
        </div>
      </div>
      <div class="status-pill" id="statusPill">투표 진행 중</div>
    </header>

    <section class="layout">
      <div class="panel">
        <div class="intro">
          <h2>다음 언어교환 모임에서 무엇을 해볼까요?</h2>
          <p>참여하고 싶은 프로그램을 하나 골라주세요. 이 브라우저에서는 한 번만 투표할 수 있고, 결과는 오른쪽에서 바로 확인할 수 있습니다.</p>
        </div>

        <div class="identity">
          <label for="nickname">닉네임</label>
          <input id="nickname" maxlength="20" autocomplete="nickname" placeholder="예: 민지, Alex, Joon">
        </div>

        <ul class="choices" id="choices"></ul>
        <div class="message" id="message" role="status" aria-live="polite"></div>
      </div>

      <aside class="side-panel" aria-label="투표 결과와 관리">
        <section class="side-section">
          <h3>실시간 결과</h3>
          <div class="result-list" id="results"></div>
        </section>

        <section class="side-section">
          <h3>요약</h3>
          <div class="summary">
            <div class="metric">
              <span>총 투표수</span>
              <strong id="totalVotes">0</strong>
            </div>
            <div class="metric">
              <span>현재 1위</span>
              <strong id="winner">-</strong>
            </div>
          </div>
        </section>

        <section class="side-section">
          <h3>관리</h3>
          <div class="admin-actions">
            <button type="button" id="toggleResults">결과 숨기기</button>
            <button type="button" class="danger" id="resetVote">결과 초기화</button>
          </div>
          <p class="note">이 첫 버전은 같은 기기 브라우저에 투표 기록을 저장합니다. 실제 여러 사람이 접속하는 운영용으로 바꾸려면 데이터 저장소를 연결하면 됩니다.</p>
        </section>
      </aside>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "languageExchange101Votes";
    const USER_VOTE_KEY = "languageExchange101UserVote";
    const RESULT_VISIBILITY_KEY = "languageExchange101ShowResults";

    const options = [
      {
        id: "speed-talk",
        icon: "A",
        title: "스피드 언어교환",
        desc: "짧게 여러 사람과 대화하며 표현을 많이 써보는 방식"
      },
      {
        id: "topic-table",
        icon: "B",
        title: "주제별 테이블",
        desc: "여행, 음식, 일상, 문화처럼 관심사별로 앉아서 대화"
      },
      {
        id: "pronunciation",
        icon: "C",
        title: "발음 교정 타임",
        desc: "서로 문장을 읽고 자연스러운 억양과 발음을 알려주기"
      },
      {
        id: "game-night",
        icon: "D",
        title: "보드게임 대화",
        desc: "게임을 하면서 자연스럽게 말문을 트는 편한 모임"
      }
    ];

    const choicesEl = document.querySelector("#choices");
    const resultsEl = document.querySelector("#results");
    const messageEl = document.querySelector("#message");
    const totalVotesEl = document.querySelector("#totalVotes");
    const winnerEl = document.querySelector("#winner");
    const statusPillEl = document.querySelector("#statusPill");
    const nicknameEl = document.querySelector("#nickname");
    const toggleResultsEl = document.querySelector("#toggleResults");
    const resetVoteEl = document.querySelector("#resetVote");

    function getDefaultVotes() {
      return options.reduce((votes, option) => {
        votes[option.id] = 0;
        return votes;
      }, {});
    }

    function loadVotes() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return getDefaultVotes();

      try {
        return { ...getDefaultVotes(), ...JSON.parse(saved) };
      } catch {
        return getDefaultVotes();
      }
    }

    function saveVotes(votes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(votes));
    }

    function getUserVote() {
      const saved = localStorage.getItem(USER_VOTE_KEY);
      if (!saved) return null;

      try {
        return JSON.parse(saved);
      } catch {
        return null;
      }
    }

    function getShowResults() {
      return localStorage.getItem(RESULT_VISIBILITY_KEY) !== "hidden";
    }

    function setShowResults(visible) {
      localStorage.setItem(RESULT_VISIBILITY_KEY, visible ? "visible" : "hidden");
    }

    function getTotal(votes) {
      return Object.values(votes).reduce((sum, count) => sum + count, 0);
    }

    function getWinner(votes) {
      const total = getTotal(votes);
      if (total === 0) return "-";

      const top = options.reduce((best, option) => {
        if (!best || votes[option.id] > votes[best.id]) return option;
        return best;
      }, null);

      return top.title;
    }

    function renderChoices(votes, userVote) {
      choicesEl.innerHTML = "";

      options.forEach((option) => {
        const li = document.createElement("li");
        li.className = "choice";

        const button = document.createElement("button");
        button.type = "button";
        button.disabled = Boolean(userVote);
        button.className = userVote && userVote.optionId === option.id ? "selected" : "";
        button.addEventListener("click", () => castVote(option.id));

        button.innerHTML = `
          <span class="choice-icon" aria-hidden="true">${option.icon}</span>
          <span>
            <span class="choice-title">${option.title}</span>
            <span class="choice-desc">${option.desc}</span>
          </span>
          <span class="vote-count">${votes[option.id]}표</span>
        `;

        li.appendChild(button);
        choicesEl.appendChild(li);
      });
    }

    function renderResults(votes) {
      const total = getTotal(votes);
      const showResults = getShowResults();

      totalVotesEl.textContent = total;
      winnerEl.textContent = getWinner(votes);
      toggleResultsEl.textContent = showResults ? "결과 숨기기" : "결과 보이기";
      resultsEl.style.display = showResults ? "grid" : "none";

      resultsEl.innerHTML = "";
      options.forEach((option) => {
        const count = votes[option.id];
        const percent = total === 0 ? 0 : Math.round((count / total) * 100);
        const row = document.createElement("div");
        row.className = "result-row";
        row.innerHTML = `
          <div class="result-meta">
            <strong>${option.title}</strong>
            <span>${count}표 · ${percent}%</span>
          </div>
          <div class="bar" aria-hidden="true"><span style="width: ${percent}%"></span></div>
        `;
        resultsEl.appendChild(row);
      });
    }

    function renderMessage(userVote) {
      if (!userVote) {
        messageEl.textContent = "닉네임을 입력하고 원하는 항목을 눌러 투표하세요.";
        statusPillEl.textContent = "투표 진행 중";
        return;
      }

      const option = options.find((item) => item.id === userVote.optionId);
      messageEl.textContent = `${userVote.nickname}님은 "${option.title}"에 투표했습니다.`;
      statusPillEl.textContent = "투표 완료";
      nicknameEl.value = userVote.nickname;
      nicknameEl.disabled = true;
    }

    function render() {
      const votes = loadVotes();
      const userVote = getUserVote();
      renderChoices(votes, userVote);
      renderResults(votes);
      renderMessage(userVote);
    }

    function castVote(optionId) {
      const existingVote = getUserVote();
      if (existingVote) return;

      const nickname = nicknameEl.value.trim();
      if (!nickname) {
        messageEl.textContent = "투표 전에 닉네임을 입력해주세요.";
        nicknameEl.focus();
        return;
      }

      const votes = loadVotes();
      votes[optionId] += 1;
      saveVotes(votes);
      localStorage.setItem(USER_VOTE_KEY, JSON.stringify({ optionId, nickname }));
      render();
    }

    toggleResultsEl.addEventListener("click", () => {
      setShowResults(!getShowResults());
      render();
    });

    resetVoteEl.addEventListener("click", () => {
      const shouldReset = window.confirm("현재 브라우저에 저장된 투표 결과를 초기화할까요?");
      if (!shouldReset) return;

      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(USER_VOTE_KEY);
      nicknameEl.disabled = false;
      nicknameEl.value = "";
      render();
    });

    render();
  </script>
</body>
</html>
